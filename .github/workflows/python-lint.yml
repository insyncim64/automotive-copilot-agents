name: Python Lint and Validate

on:
  push:
    branches: [main, develop]
    paths:
      - 'tools/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'tools/**'

defaults:
  run:
    working-directory: ./tools

jobs:
  lint:
    name: Python Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install pylint flake8 black mypy

      - name: Run flake8
        run: |
          flake8 automotive/ \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --count \
            --show-source \
            --statistics

      - name: Run black (check mode)
        run: |
          black --check --line-length=120 automotive/

      - name: Run mypy type checking
        run: |
          mypy automotive/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --disallow-untyped-defs || echo "Type checking completed"

  validate:
    name: Validate Python Syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check syntax
        run: |
          python -m py_compile automotive/__init__.py
          python -m py_compile automotive/mcp_server.py
          echo "Python syntax validation passed"

      - name: Test module import
        run: |
          PYTHONPATH=. python -c "import automotive.mcp_server; print('Import successful')"

  test:
    name: Test MCP Server
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test MCP initialize
        run: |
          cd automotive
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05"}}' | \
          python mcp_server.py | \
          python -c "import sys, json; r=json.load(sys.stdin); assert r['result']['serverInfo']['name']=='automotive-tools'"

      - name: Test tools/list
        run: |
          cd automotive
          echo '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' | \
          python mcp_server.py | \
          python -c "import sys, json; r=json.load(sys.stdin); assert len(r['result']['tools']) > 50"
