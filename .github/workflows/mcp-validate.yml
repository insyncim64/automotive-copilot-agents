name: MCP Validation Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "**/mcp-invocations.json"
  pull_request:
    branches: [main, develop]
    paths:
      - "**/mcp-invocations.json"
  workflow_dispatch:

jobs:
  validate-mcp-format:
    name: Validate MCP Invocation Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema pyyaml

      - name: Validate JSON-RPC 2.0 format
        run: |
          echo "=== Validating BMS Safety Analysis MCP Invocations ==="
          python scripts/validate_mcp_invocations.py \
            examples/bms-safety-analysis/mcp-invocations.json

          echo "=== Validating AUTOSAR SWC Demo MCP Invocations ==="
          python scripts/validate_mcp_invocations.py \
            examples/autosar-swc-demo/mcp-invocations.json

          echo "=== Validating ADAS Perception Pipeline MCP Invocations ==="
          python scripts/validate_mcp_invocations.py \
            examples/adas-perception-pipeline/mcp-invocations.json

      - name: Validate MCP tool schema
        run: |
          python scripts/validate_mcp_schema.py \
            examples/bms-safety-analysis/mcp-invocations.json \
            examples/autosar-swc-demo/mcp-invocations.json \
            examples/adas-perception-pipeline/mcp-invocations.json

  validate-traceability:
    name: Validate Traceability Mappings
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: |
          pip install jsonschema pyyaml

      - name: Validate BMS traceability
        run: |
          python scripts/validate_traceability.py \
            examples/bms-safety-analysis/mcp-invocations.json

      - name: Validate AUTOSAR traceability
        run: |
          python scripts/validate_traceability.py \
            examples/autosar-swc-demo/mcp-invocations.json

      - name: Validate ADAS traceability
        run: |
          python scripts/validate_traceability.py \
            examples/adas-perception-pipeline/mcp-invocations.json

  validate-safety-linkage:
    name: Validate Safety Requirement Linkage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: |
          pip install pyyaml jsonschema

      - name: Validate HARA linkage (BMS)
        run: |
          python scripts/validate_hara_linkage.py \
            examples/bms-safety-analysis/mcp-invocations.json \
            examples/bms-safety-analysis/03-hara-report.md

      - name: Validate FMEA linkage (BMS)
        run: |
          python scripts/validate_fmea_linkage.py \
            examples/bms-safety-analysis/mcp-invocations.json \
            examples/bms-safety-analysis/04-fmea-report.md

      - name: Validate FTA linkage (BMS)
        run: |
          python scripts/validate_fta_linkage.py \
            examples/bms-safety-analysis/mcp-invocations.json \
            examples/bms-safety-analysis/05-fta-report.md

      - name: Validate ASIL decomposition linkage (BMS)
        run: |
          python scripts/validate_asil_linkage.py \
            examples/bms-safety-analysis/mcp-invocations.json \
            examples/bms-safety-analysis/06-asil-decomposition.md

      - name: Validate ODD linkage (ADAS)
        run: |
          python scripts/validate_odd_linkage.py \
            examples/adas-perception-pipeline/mcp-invocations.json \
            examples/adas-perception-pipeline/01-odd-definition.md

      - name: Validate SOTIF linkage (ADAS)
        run: |
          python scripts/validate_sotif_linkage.py \
            examples/adas-perception-pipeline/mcp-invocations.json \
            examples/adas-perception-pipeline/06-scenario-validation-report.md

  validate-tool-invocations:
    name: Validate Tool Invocation Completeness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: |
          pip install pyyaml jsonschema

      - name: Validate BMS tool coverage
        run: |
          python scripts/validate_tool_coverage.py \
            --project bms-safety-analysis \
            --expected-tools \
              battery-param-read,\
              cell-voltage-monitor,\
              thermal-model-sim,\
              soc-ekf-update,\
              contactor-control,\
              fault-inject,\
              bms-safety-validate

      - name: Validate AUTOSAR tool coverage
        run: |
          python scripts/validate_tool_coverage.py \
            --project autosar-swc-demo \
            --expected-tools \
              autosar-swc-create,\
              autosar-port-configure,\
              autosar-runnable-define,\
              autosar-mode-switch,\
              autosar-swc-validate

      - name: Validate ADAS tool coverage
        run: |
          python scripts/validate_tool_coverage.py \
            --project adas-perception-pipeline \
            --expected-tools \
              adas-odd-define,\
              adas-camera-calibrate,\
              adas-lidar-calibrate,\
              adas-sensor-fusion,\
              adas-perception-pipeline,\
              adas-perception-eval,\
              adas-scenario-replay,\
              adas-fusion-validate

  generate-validation-report:
    name: Generate MCP Validation Report
    runs-on: ubuntu-latest
    needs: [validate-mcp-format, validate-traceability, validate-safety-linkage, validate-tool-invocations]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install report dependencies
        run: |
          pip install pyyaml jsonschema jinja2

      - name: Generate comprehensive validation report
        run: |
          python scripts/generate_mcp_validation_report.py \
            --output mcp-validation-report.md \
            --projects \
              examples/bms-safety-analysis,\
              examples/autosar-swc-demo,\
              examples/adas-perception-pipeline

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: mcp-validation-report
          path: mcp-validation-report.md
          retention-days: 30

      - name: Print validation summary
        run: |
          echo "=== MCP Validation Summary ==="
          cat mcp-validation-report.md | head -50
