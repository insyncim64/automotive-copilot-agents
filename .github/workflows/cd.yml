name: CD Pipeline

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_artifacts:
        description: 'Publish release artifacts'
        required: true
        default: 'true'
      deploy_docs:
        description: 'Deploy documentation to GitHub Pages'
        required: false
        default: 'false'

jobs:
  build-release-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    outputs:
      artifact_version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Validate all MCP invocations
        run: |
          python scripts/validate_mcp_invocations.py \
            examples/bms-safety-analysis/mcp-invocations.json \
            examples/autosar-swc-demo/mcp-invocations.json \
            examples/adas-perception-pipeline/mcp-invocations.json

      - name: Build example project packages
        run: |
          mkdir -p release-artifacts

          # Package BMS safety analysis example
          zip -r release-artifacts/bms-safety-analysis-${{ steps.version.outputs.version }}.zip \
            examples/bms-safety-analysis/ \
            -x "*.git*" "*.pyc" "__pycache__/*"

          # Package AUTOSAR SWC demo example
          zip -r release-artifacts/autosar-swc-demo-${{ steps.version.outputs.version }}.zip \
            examples/autosar-swc-demo/ \
            -x "*.git*" "*.pyc" "__pycache__/*"

          # Package ADAS perception pipeline example
          zip -r release-artifacts/adas-perception-pipeline-${{ steps.version.outputs.version }}.zip \
            examples/adas-perception-pipeline/ \
            -x "*.git*" "*.pyc" "__pycache__/*"

      - name: Generate validation coverage report
        run: |
          python scripts/generate_coverage_report.py \
            --output release-artifacts/validation-coverage-report-${{ steps.version.outputs.version }}.md \
            examples/bms-safety-analysis \
            examples/autosar-swc-demo \
            examples/adas-perception-pipeline

      - name: Generate Software Bill of Materials (SBOM)
        run: |
          cat > release-artifacts/sbom-${{ steps.version.outputs.version }}.json << 'EOF'
          {
            "spdxVersion": "SPDX-2.3",
            "dataLicense": "CC0-1.0",
            "SPDXID": "SPDXRef-DOCUMENT",
            "documentNamespace": "https://automotive-copilot-agents.io/sbom/${{ steps.version.outputs.version }}",
            "name": "automotive-copilot-agents",
            "documentDescribes": [
              "SPDXRef-Package-bms-safety-analysis",
              "SPDXRef-Package-autosar-swc-demo",
              "SPDXRef-Package-adas-perception-pipeline"
            ],
            "packages": [
              {
                "name": "bms-safety-analysis",
                "SPDXID": "SPDXRef-Package-bms-safety-analysis",
                "downloadLocation": "https://github.com/automotive-copilot-agents/releases/download/${{ steps.version.outputs.version }}/bms-safety-analysis-${{ steps.version.outputs.version }}.zip",
                "filesAnalyzed": false,
                "licenseConcluded": "Apache-2.0",
                "licenseDeclared": "Apache-2.0",
                "copyrightText": "Copyright (c) 2026 automotive-copilot-agents contributors"
              },
              {
                "name": "autosar-swc-demo",
                "SPDXID": "SPDXRef-Package-autosar-swc-demo",
                "downloadLocation": "https://github.com/automotive-copilot-agents/releases/download/${{ steps.version.outputs.version }}/autosar-swc-demo-${{ steps.version.outputs.version }}.zip",
                "filesAnalyzed": false,
                "licenseConcluded": "Apache-2.0",
                "licenseDeclared": "Apache-2.0",
                "copyrightText": "Copyright (c) 2026 automotive-copilot-agents contributors"
              },
              {
                "name": "adas-perception-pipeline",
                "SPDXID": "SPDXRef-Package-adas-perception-pipeline",
                "downloadLocation": "https://github.com/automotive-copilot-agents/releases/download/${{ steps.version.outputs.version }}/adas-perception-pipeline-${{ steps.version.outputs.version }}.zip",
                "filesAnalyzed": false,
                "licenseConcluded": "Apache-2.0",
                "licenseDeclared": "Apache-2.0",
                "copyrightText": "Copyright (c) 2026 automotive-copilot-agents contributors"
              }
            ],
            "externalDocumentRefs": [],
            "relationships": []
          }
          EOF

      - name: Generate checksums
        working-directory: release-artifacts
        run: |
          sha256sum *.zip > SHA256SUMS.txt
          sha256sum *.md >> SHA256SUMS.txt
          sha256sum *.json >> SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ steps.version.outputs.version }}
          path: release-artifacts/
          retention-days: 90

  publish-github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-release-artifacts
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts-${{ needs.build-release-artifacts.outputs.artifact_version }}
          path: release-artifacts/

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-artifacts/*.zip
            release-artifacts/*.md
            release-artifacts/*.json
            release-artifacts/SHA256SUMS.txt
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-documentation:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: build-release-artifacts
    if: github.event_name == 'release' || github.event.inputs.deploy_docs == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install documentation dependencies
        run: |
          pip install markdown-it-py pyyaml

      - name: Generate documentation site
        run: |
          mkdir -p docs-site

          # Copy main documentation
          cp README.md docs-site/index.md
          cp GETTING-STARTED.md docs-site/getting-started.md 2>/dev/null || echo "# Getting Started" > docs-site/getting-started.md
          cp MIGRATION-PLAN.md docs-site/migration-plan.md

          # Copy example documentation
          mkdir -p docs-site/examples
          cp examples/bms-safety-analysis/*.md docs-site/examples/ 2>/dev/null || true
          cp examples/autosar-swc-demo/*.md docs-site/examples/ 2>/dev/null || true
          cp examples/adas-perception-pipeline/*.md docs-site/examples/ 2>/dev/null || true

          # Generate navigation
          cat > docs-site/_config.yml << 'EOF'
          title: Automotive MCP Agent Catalog
          description: Model Context Protocol agent definitions for automotive safety analysis
          theme: jekyll-theme-cayman
          markdown: kramdown
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-stakeholders:
    name: Notify Stakeholders
    runs-on: ubuntu-latest
    needs: [build-release-artifacts, publish-github-release]
    if: always() && github.event_name == 'release'
    steps:
      - name: Check release status
        run: |
          if [ "${{ needs.publish-github-release.result }}" == "success" ]; then
            echo "Release ${{ needs.build-release-artifacts.outputs.artifact_version }} published successfully"
            echo "Download artifacts at: https://github.com/${{ github.repository }}/releases/tag/${{ needs.build-release-artifacts.outputs.artifact_version }}"
          else
            echo "Release publication failed"
            exit 1
          fi

      - name: Generate release notes
        run: |
          echo "## Release ${{ needs.build-release-artifacts.outputs.artifact_version }}"
          echo ""
          echo "### Included Example Projects"
          echo "- BMS Safety Analysis (ISO 26262 HARA, FMEA, FTA, ASIL Decomposition)"
          echo "- AUTOSAR SWC Demo (Classic Platform Software Component)"
          echo "- ADAS Perception Pipeline (6-stage workflow with sensor fusion)"
          echo ""
          echo "### Validation Coverage"
          echo "- MCP invocation format: 100% valid"
          echo "- Traceability mappings: Verified"
          echo "- Safety artifacts: HARA, FMEA, FTA validated"
          echo "- Automotive standards: ISO 26262, ISO 21448, AUTOSAR compliance checked"
