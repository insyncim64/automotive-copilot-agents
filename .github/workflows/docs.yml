name: Documentation Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "**/*.md"
      - "docs/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: 'Deploy to GitHub Pages'
        required: false
        default: 'false'

jobs:
  validate-markdown:
    name: Validate Markdown Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml markdown-it-py

      - name: Validate all markdown files
        run: |
          python scripts/validate_markdown.py \
            README.md \
            MIGRATION-PLAN.md \
            examples/bms-safety-analysis/*.md \
            examples/autosar-swc-demo/*.md \
            examples/adas-perception-pipeline/*.md

      - name: Validate internal links
        run: |
          python scripts/validate_links.py \
            README.md \
            examples/bms-safety-analysis/README.md \
            examples/autosar-swc-demo/README.md \
            examples/adas-perception-pipeline/README.md

  generate-example-docs:
    name: Generate Example Documentation
    runs-on: ubuntu-latest
    needs: validate-markdown
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install documentation dependencies
        run: |
          pip install pyyaml markdown-it-py jinja2

      - name: Generate BMS documentation
        run: |
          python scripts/generate_example_docs.py \
            --input examples/bms-safety-analysis \
            --output docs-site/bms-safety-analysis \
            --template docs/templates/example-project.html

      - name: Generate AUTOSAR documentation
        run: |
          python scripts/generate_example_docs.py \
            --input examples/autosar-swc-demo \
            --output docs-site/autosar-swc-demo \
            --template docs/templates/example-project.html

      - name: Generate ADAS documentation
        run: |
          python scripts/generate_example_docs.py \
            --input examples/adas-perception-pipeline \
            --output docs-site/adas-perception-pipeline \
            --template docs/templates/example-project.html

      - name: Upload generated docs
        uses: actions/upload-artifact@v4
        with:
          name: generated-docs
          path: docs-site/
          retention-days: 30

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [validate-markdown, generate-example-docs]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || \
        (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_pages == 'true')
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install documentation dependencies
        run: |
          pip install markdown-it-py pyyaml jinja2

      - name: Generate documentation site
        run: |
          mkdir -p docs-site

          # Copy main documentation
          cp README.md docs-site/index.md
          cp MIGRATION-PLAN.md docs-site/migration-plan.md

          # Copy example documentation
          mkdir -p docs-site/examples/bms-safety-analysis
          mkdir -p docs-site/examples/autosar-swc-demo
          mkdir -p docs-site/examples/adas-perception-pipeline

          cp examples/bms-safety-analysis/*.md docs-site/examples/bms-safety-analysis/
          cp examples/autosar-swc-demo/*.md docs-site/examples/autosar-swc-demo/
          cp examples/adas-perception-pipeline/*.md docs-site/examples/adas-perception-pipeline/

          # Generate navigation configuration
          cat > docs-site/_config.yml << 'EOF'
          title: Automotive MCP Agent Catalog
          description: Model Context Protocol agent definitions for automotive safety analysis
          theme: jekyll-theme-cayman
          markdown: kramdown

          navigation:
            - title: Home
              url: /
            - title: BMS Safety Analysis
              url: /examples/bms-safety-analysis/README.html
            - title: AUTOSAR SWC Demo
              url: /examples/autosar-swc-demo/README.html
            - title: ADAS Perception Pipeline
              url: /examples/adas-perception-pipeline/README.html
            - title: Migration Plan
              url: /migration-plan.html
          EOF

          # Generate README for docs site
          cat > docs-site/README.md << 'EOF'
          # Automotive MCP Agent Catalog Documentation

          This site contains documentation for the Model Context Protocol (MCP) agent definitions
          for automotive safety analysis and development.

          ## Example Projects

          - [BMS Safety Analysis](examples/bms-safety-analysis/README.html) - ISO 26262 HARA, FMEA, FTA analysis
          - [AUTOSAR SWC Demo](examples/autosar-swc-demo/README.html) - Classic Platform Software Component
          - [ADAS Perception Pipeline](examples/adas-perception-pipeline/README.html) - 6-stage sensor fusion workflow

          ## Validation Coverage

          All example projects include:
          - Validated MCP invocation JSON-RPC format
          - Traceability mappings to safety requirements
          - ISO 26262 compliance verification
          - Automated CI/CD validation
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-pdf-docs:
    name: Build PDF Documentation
    runs-on: ubuntu-latest
    needs: validate-markdown
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PDF generation dependencies
        run: |
          pip install markdown-it-py pyyaml
          sudo apt-get update && sudo apt-get install -y wkhtmltopdf

      - name: Generate PDF documentation
        run: |
          mkdir -p docs-pdf

          # Generate PDFs for each example project
          python scripts/generate_pdf_docs.py \
            --input examples/bms-safety-analysis \
            --output docs-pdf/bms-safety-analysis.pdf \
            --title "BMS Safety Analysis Documentation"

          python scripts/generate_pdf_docs.py \
            --input examples/autosar-swc-demo \
            --output docs-pdf/autosar-swc-demo.pdf \
            --title "AUTOSAR SWC Demo Documentation"

          python scripts/generate_pdf_docs.py \
            --input examples/adas-perception-pipeline \
            --output docs-pdf/adas-perception-pipeline.pdf \
            --title "ADAS Perception Pipeline Documentation"

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdf-documentation
          path: docs-pdf/
          retention-days: 90
