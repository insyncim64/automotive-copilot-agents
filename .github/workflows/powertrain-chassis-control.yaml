name: Powertrain and Chassis Control Validation
version: 1.0.0
description: "Comprehensive validation workflow for powertrain and chassis control systems including motor control, transmission, braking, steering, and vehicle dynamics"

on:
  push:
    branches: [develop, release/*]
    paths:
      - 'src/powertrain/**'
      - 'src/chassis/**'
      - 'tests/powertrain/**'
      - 'tests/chassis/**'
      - 'models/powertrain/**'
      - 'models/chassis/**'
      - 'config/powertrain/**'
      - 'config/chassis/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/powertrain/**'
      - 'src/chassis/**'
      - 'tests/powertrain/**'
      - 'tests/chassis/**'
  schedule:
    # Weekly powertrain/chassis safety review
    - cron: '0 0 * * 2'

env:
  SAFETY_LEVEL: ASIL-D
  PYTHON_VERSION: '3.10'
  POWERTRAIN_SIM_VERSION: '3.2.0'
  VEHICLE_DYNAMICS_VERSION: '2.1.0'

jobs:
  motor-control-validation:
    name: Motor Control Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install powertrain test dependencies
        run: |
          pip install -r requirements-powertrain.txt
          pip install -r requirements-testing.txt

      - name: Validate motor torque control accuracy
        run: |
          python tests/powertrain/test_torque_control.py \
            --model models/powertrain/torque_controller_v3.onnx \
            --dataset data/powertrain/torque_step_response.csv \
            --metrics results/torque-control-metrics.json \
            --rise-time-max-ms 50 \
            --overshoot-max-percent 5 \
            --steady-state-error-max-percent 2

      - name: Validate motor speed control
        run: |
          python tests/powertrain/test_speed_control.py \
            --controller models/powertrain/speed_pid_v2.py \
            --dataset data/powertrain/speed_ramp_test.csv \
            --metrics results/speed-control-metrics.json \
            --tracking-error-max-rpm 50 \
            --settling-time-max-ms 200

      - name: Validate field-oriented control (FOC)
        run: |
          python tests/powertrain/test_foc_algorithm.py \
            --algorithm foc \
            --motor-params config/powertrain/motor_parameters.yaml \
            --dataset data/powertrain/foc_validation.csv \
            --metrics results/foc-metrics.json \
            --thd-max-percent 5 \
            --efficiency-min-percent 95

      - name: Validate regenerative braking
        run: |
          python tests/powertrain/test_regen_braking.py \
            --model models/powertrain/regen_controller_v2.py \
            --dataset data/powertrain/regen_brake_test.csv \
            --metrics results/regen-braking-metrics.json \
            --energy-recovery-min-percent 70 \
            --blend-smoothness-max-jerk 2.0

      - name: Validate inverter switching control
        run: |
          python tests/powertrain/test_inverter_control.py \
            --sw-frequency-khz 20 \
            --dead-time-us 2 \
            --dataset data/powertrain/inverter_validation.csv \
            --metrics results/inverter-metrics.json \
            --thd-max-percent 3

      - name: Upload motor control results
        uses: actions/upload-artifact@v4
        with:
          name: motor-control-results
          path: |
            results/torque-*.json
            results/speed-*.json
            results/foc-*.json
            results/regen-*.json
            results/inverter-*.json

  transmission-control-validation:
    name: Transmission Control Validation
    runs-on: ubuntu-latest
    needs: motor-control-validation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install transmission test dependencies
        run: |
          pip install -r requirements-powertrain.txt

      - name: Download motor control results
        uses: actions/download-artifact@v4
        with:
          name: motor-control-results
          path: results/

      - name: Validate automatic transmission shift logic
        run: |
          python tests/powertrain/test_shift_logic.py \
            --transmission-type automatic \
            --gear-count 8 \
            --dataset data/powertrain/shift_schedule_test.csv \
            --metrics results/shift-logic-metrics.json \
            --shift-quality-max-jerk 3.0 \
            --shift-time-max-ms 500

      - name: Validate dual-clutch transmission control
        run: |
          python tests/powertrain/test_dct_control.py \
            --transmission-type dct \
            --dataset data/powertrain/dct_validation.csv \
            --metrics results/dct-control-metrics.json \
            --clutch-slip-max-rpm 100 \
            --shift-time-max-ms 200 \
            --torque-interruption-max-ms 50

      - name: Validate CVT ratio control
        run: |
          python tests/powertrain/test_cvt_control.py \
            --transmission-type cvt \
            --dataset data/powertrain/cvt_ratio_test.csv \
            --metrics results/cvt-control-metrics.json \
            --ratio-tracking-error-max-percent 2 \
            --response-time-max-ms 300

      - name: Validate clutch engagement control
        run: |
          python tests/powertrain/test_clutch_control.py \
            --clutch-type wet_multiplate \
            --dataset data/powertrain/clutch_engagement.csv \
            --metrics results/clutch-control-metrics.json \
            --engagement-time-max-ms 400 \
            --jerk-max-ms3 10 \
            --slip-energy-max-j 5000

      - name: Upload transmission control results
        uses: actions/upload-artifact@v4
        with:
          name: transmission-control-results
          path: |
            results/shift-*.json
            results/dct-*.json
            results/cvt-*.json
            results/clutch-*.json

  braking-system-validation:
    name: Braking System Validation (ASIL-D)
    runs-on: ubuntu-latest
    needs: motor-control-validation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install braking system test dependencies
        run: |
          pip install -r requirements-chassis.txt
          pip install -r requirements-safety.txt

      - name: Validate ABS (Anti-lock Braking System)
        run: |
          python tests/chassis/test_abs_control.py \
            --model models/chassis/abs_controller_v4.py \
            --dataset data/chassis/abs_validation.csv \
            --metrics results/abs-metrics.json \
            --slip-ratio-target 0.15 \
            --slip-tolerance 0.05 \
            --pressure-modulation-frequency-hz 10 \
            --stopping-distance-max-m 35

      - name: Validate ESP (Electronic Stability Program)
        run: |
          python tests/chassis/test_esp_control.py \
            --model models/chassis/esp_controller_v3.py \
            --dataset data/chassis/esp_moose_test.csv \
            --metrics results/esp-metrics.json \
            --yaw-rate-tracking-error-max 0.2 \
            --sideslip-angle-max-deg 8 \
            --intervention-delay-max-ms 100

      - name: Validate brake force distribution (EBD)
        run: |
          python tests/chassis/test_ebd_control.py \
            --model models/chassis/ebd_controller_v2.py \
            --dataset data/chassis/ebd_validation.csv \
            --metrics results/ebd-metrics.json \
            --front-rear-balance-error-max-percent 5 \
            --load-sensing-accuracy-percent 3

      - name: Validate electronic brake assist (EBA)
        run: |
          python tests/chassis/test_brake_assist.py \
            --model models/chassis/brake_assist_v2.py \
            --dataset data/chassis/emergency_braking.csv \
            --metrics results/brake-assist-metrics.json \
            --pedal-rate-threshold-percent-per-s 80 \
            --assist-activation-delay-max-ms 50 \
            --pressure-boost-max-bar 50

      - name: Validate brake-by-wire system
        run: |
          python tests/chassis/test_brake_by_wire.py \
            --model models/chassis/brake_by_wire_v3.py \
            --dataset data/chassis/bbw_validation.csv \
            --metrics results/bbw-metrics.json \
            --pedal-feel-consistency-max-error-percent 5 \
            --redundancy-switch-over-max-ms 10 \
            --fail-safe-deceleration-min-ms2 3.0

      - name: Upload braking system results
        uses: actions/upload-artifact@v4
        with:
          name: braking-system-results
          path: |
            results/abs-*.json
            results/esp-*.json
            results/ebd-*.json
            results/brake-assist-*.json
            results/bbw-*.json

  steering-system-validation:
    name: Steering System Validation (ASIL-D)
    runs-on: ubuntu-latest
    needs: braking-system-validation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install steering system test dependencies
        run: |
          pip install -r requirements-chassis.txt

      - name: Download braking system results
        uses: actions/download-artifact@v4
        with:
          name: braking-system-results
          path: results/

      - name: Validate electric power steering (EPS) assist
        run: |
          python tests/chassis/test_eps_assist.py \
            --model models/chassis/eps_assist_v3.py \
            --dataset data/chassis/eps_assist_map.csv \
            --metrics results/eps-assist-metrics.json \
            --assist-curve-error-max-percent 5 \
            --steering-torque-range-nm 2-10 \
            --vehicle-speed-range-kmh 0-180

      - name: Validate EPS returnability
        run: |
          python tests/chassis/test_eps_returnability.py \
            --model models/chassis/eps_return_v2.py \
            --dataset data/chassis/returnability_test.csv \
            --metrics results/eps-return-metrics.json \
            --return-time-max-s 1.5 \
            --overshoot-max-deg 5 \
            --centering-accuracy-max-deg 2

      - name: Validate active steering control
        run: |
          python tests/chassis/test_active_steering.py \
            --model models/chassis/active_steering_v3.py \
            --dataset data/chassis/active_steering.csv \
            --metrics results/active-steering-metrics.json \
            --ratio-variation-range 12-20 \
            --steer-angle-accuracy-max-deg 0.5 \
            --overlay-smoothness-max-jerk 3

      - name: Validate lane keeping assist (LKA)
        run: |
          python tests/chassis/test_lka_steering.py \
            --model models/chassis/lka_controller_v4.py \
            --dataset data/chassis/lka_validation.csv \
            --metrics results/lka-metrics.json \
            --lane-centering-error-max-m 0.3 \
            --steering-intervention-max-deg 5 \
            --driver-override-torque-nm 3

      - name: Validate steer-by-wire system
        run: |
          python tests/chassis/test_steer_by_wire.py \
            --model models/chassis/steer_by_wire_v2.py \
            --dataset data/chassis/sbw_validation.csv \
            --metrics results/sbw-metrics.json \
            --latency-max-ms 10 \
            --redundancy-check-frequency-hz 100 \
            --fail-safe-mode-torque-nm 5

      - name: Upload steering system results
        uses: actions/upload-artifact@v4
        with:
          name: steering-system-results
          path: |
            results/eps-*.json
            results/active-steering-*.json
            results/lka-*.json
            results/sbw-*.json

  suspension-control-validation:
    name: Suspension Control Validation
    runs-on: ubuntu-latest
    needs: steering-system-validation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install suspension test dependencies
        run: |
          pip install -r requirements-chassis.txt

      - name: Validate adaptive damping control
        run: |
          python tests/chassis/test_adaptive_damping.py \
            --model models/chassis/adaptive_damper_v3.py \
            --dataset data/chassis/damping_validation.csv \
            --metrics results/damping-metrics.json \
            --response-time-max-ms 20 \
            --comfort-index-improvement-percent 15 \
            --road-holding-improvement-percent 10

      - name: Validate air suspension control
        run: |
          python tests/chassis/test_air_suspension.py \
            --model models/chassis/air_suspension_v2.py \
            --dataset data/chassis/air_susp_test.csv \
            --metrics results/air-susp-metrics.json \
            --ride-height-accuracy-max-mm 5 \
            --leveling-time-max-s 30 \
            --knee-position-accuracy-mm 3

      - -name: Validate anti-roll bar control
        run: |
          python tests/chassis/test_active_anti_roll.py \
            --model models/chassis/active_anti_roll_v2.py \
            --dataset data/chassis/anti_roll_validation.csv \
            --metrics results/anti-roll-metrics.json \
            --roll-angle-reduction-percent 40 \
            --response-time-max-ms 50

      - name: Validate road preview suspension
        run: |
          python tests/chassis/test_road_preview_susp.py \
            --model models/chassis/road_preview_susp_v3.py \
            --dataset data/chassis/road_preview_test.csv \
            --metrics results/road-preview-metrics.json \
            --camera-latency-compensation-ms 100 \
            --comfort-improvement-percent 20

      - name: Upload suspension results
        uses: actions/upload-artifact@v4
        with:
          name: suspension-control-results
          path: |
            results/damping-*.json
            results/air-susp-*.json
            results/anti-roll-*.json
            results/road-preview-*.json

  vehicle-dynamics-validation:
    name: Vehicle Dynamics Validation
    runs-on: gpu-latest
    needs: [braking-system-validation, steering-system-validation, suspension-control-validation]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install vehicle dynamics dependencies
        run: |
          pip install -r requirements-dynamics.txt
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cu118

      - name: Download all chassis results
        uses: actions/download-artifact@v4
        with:
          pattern: '*-results'
          path: results/

      - name: Run vehicle model simulation
        run: |
          python tests/chassis/vehicle_model_simulation.py \
            --model models/dynamics/full_vehicle_v4.fmu \
            --scenario data/dynamics/double_lane_change.csv \
            --metrics results/vehicle-model-metrics.json

      - name: Validate handling characteristics
        run: |
          python tests/chassis/test_handling.py \
            --model models/dynamics/handling_v3.py \
            --scenarios "skidpad,steady_state_cornering,step_steering" \
            --dataset data/dynamics/handling_validation.csv \
            --metrics results/handling-metrics.json \
            --understeer-gradient-deg-g 1-3 \
            --lateral-accel-max-g 0.85 \
            --yaw-damping-ratio 0.6-0.8

      - name: Validate ride comfort
        run: |
          python tests/chassis/test_ride_comfort.py \
            --model models/dynamics/ride_comfort_v3.py \
            --dataset data/dynamics/ride_validation.csv \
            --metrics results/ride-comfort-metrics.json \
            --weighted-rms-accel-max-ms2 0.5 \
            --vibration-dose-max 15 \
            --iso-2631-compliance

      - name: Validate NVH characteristics
        run: |
          python tests/chassis/test_nvh.py \
            --model models/dynamics/nvh_v2.py \
            --dataset data/dynamics/nvh_validation.csv \
            --metrics results/nvh-metrics.json \
            --booming-noise-max-db 65 \
            --road-noise-max-db 70 \
            --motor-whine-max-db 60

      - name: Validate energy efficiency
        run: |
          python tests/chassis/test_energy_efficiency.py \
            --model models/dynamics/energy_model_v3.py \
            --cycle WLTP \
            --dataset data/dynamics/efficiency_validation.csv \
            --metrics results/efficiency-metrics.json \
            --consumption-target-kwh-per-100km 18 \
            --regen-contribution-percent 15

      - name: Upload vehicle dynamics results
        uses: actions/upload-artifact@v4
        with:
          name: vehicle-dynamics-results
          path: |
            results/vehicle-model-*.json
            results/handling-*.json
            results/ride-comfort-*.json
            results/nvh-*.json
            results/efficiency-*.json

  hil-integration-testing:
    name: HIL Integration Testing
    runs-on: self-hosted
    needs: [vehicle-dynamics-validation, transmission-control-validation]
    environment: powertrain-chassis-hil-bench
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build powertrain/chassis firmware for HIL target
        run: |
          cmake -B build -DCMAKE_TOOLCHAIN_FILE=toolchain-powertrain-ecu.cmake
          cmake --build build --target powertrain_chassis_firmware

      - name: Flash powertrain ECU
        run: |
          python tools/flash_powertrain_ecu.py \
            --target ${{ vars.POWERTRAIN_ECU_TARGET }} \
            --binary build/powertrain_firmware.bin \
            --verify

      - name: Flash chassis ECU
        run: |
          python tools/flash_chassis_ecu.py \
            --target ${{ vars.CHASSIS_ECU_TARGET }} \
            --binary build/chassis_firmware.bin \
            --verify

      - name: Run HIL powertrain integration test
        run: |
          robot --outputdir results/hil/powertrain/ \
            --variable POWERTRAIN_ECU:${{ vars.POWERTRAIN_ECU_TARGET }} \
            --include powertrain-integration \
            tests/hil/powertrain/

      - name: Run HIL chassis integration test
        run: |
          robot --outputdir results/hil/chassis/ \
            --variable CHASSIS_ECU:${{ vars.CHASSIS_ECU_TARGET }} \
            --include chassis-integration \
            tests/hil/chassis/

      - name: Run HIL vehicle dynamics test
        run: |
          robot --outputdir results/hil/dynamics/ \
            --variable POWERTRAIN_ECU:${{ vars.POWERTRAIN_ECU_TARGET }} \
            --variable CHASSIS_ECU:${{ vars.CHASSIS_ECU_TARGET }} \
            --include vehicle-dynamics \
            tests/hil/integration/

      - name: Run HIL fault injection test
        run: |
          robot --outputdir results/hil/faults/ \
            --variable POWERTRAIN_ECU:${{ vars.POWERTRAIN_ECU_TARGET }} \
            --variable CHASSIS_ECU:${{ vars.CHASSIS_ECU_TARGET }} \
            --include fault-injection \
            tests/hil/safety/

      - name: Validate timing requirements
        run: |
          python tests/hil/verify_timing.py \
            --ecu ${{ vars.POWERTRAIN_ECU_TARGET }} \
            --ecu ${{ vars.CHASSIS_ECU_TARGET }} \
            --max-cycle-time-ms 5 \
            --jitter-max-ms 0.5 \
            --output results/hil-timing-verification.json

      - name: Validate CAN/Ethernet communication
        run: |
          python tests/hil/test_communication.py \
            --buses POWERTRAIN_CAN,CHASSIS_CAN,ETH \
            --messages all \
            --timeout-ms 500 \
            --output results/hil-communication.json

      - name: Upload HIL results
        uses: actions/upload-artifact@v4
        with:
          name: hil-results
          path: |
            results/hil/
            results/hil-*.json

  safety-compliance-validation:
    name: Safety Compliance Validation (ASIL-D)
    runs-on: ubuntu-latest
    needs: hil-integration-testing
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety compliance dependencies
        run: |
          pip install -r requirements-safety.txt

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: '*-results'
          path: all-results/

      - name: Validate ISO 26262 safety requirements
        run: |
          python tools/validate_iso26262_requirements.py \
            --safety-plan config/safety/safety_plan.yaml \
            --test-results all-results/ \
            --asil-level D \
            --output results/iso26262-compliance.json

      - name: Calculate diagnostic coverage
        run: |
          python tools/calculate_diagnostic_coverage_powertrain.py \
            --fmdea-report config/safety/powertrain_fmdea.yaml \
            --test-coverage all-results/ \
            --target-coverage 0.99 \
            --output results/diagnostic-coverage-powertrain.md

      - name: Verify ASIL decomposition
        run: |
          python tools/verify_asil_decomposition.py \
            --decomposition-report config/safety/powertrain_decomposition.yaml \
            --test-evidence all-results/ \
            --output results/asil-decomposition-verification.md

      - name: Generate safety case update
        run: |
          python tools/update_safety_case.py \
            --safety-case config/safety/powertrain_safety_case.yaml \
            --new-evidence all-results/ \
            --output results/safety-case-update.md

      - name: Upload safety compliance results
        uses: actions/upload-artifact@v4
        with:
          name: safety-compliance-results
          path: |
            results/iso26262-*.json
            results/diagnostic-coverage-*.md
            results/asil-decomposition-*.md
            results/safety-case-*.md

  release-approval:
    name: Release Approval
    runs-on: ubuntu-latest
    needs: [safety-compliance-validation]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: '*-results'
          path: all-results/

      - name: Compile powertrain/chassis validation summary
        run: |
          python tools/compile_powertrain_chassis_report.py \
            --inputs all-results/ \
            --template templates/powertrain-chassis-validation-report.md \
            --output powertrain-chassis-validation-summary.md

      - name: Check open safety issues
        run: |
          gh issue list \
            --label "powertrain" \
            --label "chassis" \
            --label "safety" \
            --state open \
            > open-safety-issues.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release recommendation
        run: |
          python tools/generate_powertrain_release_recommendation.py \
            --summary powertrain-chassis-validation-summary.md \
            --safety-issues open-safety-issues.md \
            --asil-level ${{ env.SAFETY_LEVEL }} \
            --output release-recommendation.md

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: powertrain-chassis-release-package
          path: |
            powertrain-chassis-validation-summary.md
            release-recommendation.md
            open-safety-issues.md
            all-results/safety-*.json
            all-results/diagnostic-coverage-*.md
